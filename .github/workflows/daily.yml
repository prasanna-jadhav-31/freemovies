name: Global Movie Update
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

permissions:
  contents: write  # THIS IS THE OVERRIDE

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          # Use fetch-depth 0 to ensure we have full history for the push
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Automation Script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          UNIVERSAL_LINK: ${{ secrets.UNIVERSAL_LINK }}
          DIRECT_AD_LINK: ${{ secrets.DIRECT_AD_LINK }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # The || exit 0 prevents the 128 error if there's nothing new to commit
          git commit -m "Automated Update: $(date)" || exit 0
          git push origin main
