name: Daily Movie Update
on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours (Better for API health)
  workflow_dispatch:      # Allows you to click "Run" manually

permissions:
  contents: write         # FIXES THE 404 ERROR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          UNIVERSAL_LINK: ${{ secrets.UNIVERSAL_LINK }}
          DIRECT_AD_LINK: ${{ secrets.DIRECT_AD_LINK }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "MovieBot"
          git config --global user.email "bot@github.com"
          git add index.html search.html movies/
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Updated 50+ Global Movies" && git push)
